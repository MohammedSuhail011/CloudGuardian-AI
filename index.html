<!doctype html>
<html lang="en" data-theme="theme-cyberpunk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CloudGuardian AI</title>
    <script>
      (function() {
        try {
          var saved = localStorage.getItem('cyberweb-settings');
          if (saved) {
            var data = JSON.parse(saved);
            if (data.theme === 'Midnight Azure') document.documentElement.setAttribute('data-theme', 'theme-azure');
            else if (data.theme === 'Neon Matrix') document.documentElement.setAttribute('data-theme', 'theme-matrix');
            else document.documentElement.setAttribute('data-theme', 'theme-cyberpunk');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
